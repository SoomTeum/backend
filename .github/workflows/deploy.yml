# .github/workflows/deploy.yml
name: CI/CD Deploy to EC2

# 이벤트 트리거: dev 브랜치에 push 발생 시 실행
on:
  push:
    branches:
      - dev

jobs:
  build-push-deploy:
    name: Build, Push Docker Image and Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      # Checkout repository
      - name: Checkout code
        uses: actions/checkout@v3

      # Set up JDK 17 (Spring 프로젝트용)
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # Build with Gradle
      - name: Build with Gradle
        run: ./gradlew build -x test

      # Run tests
      - name: Run tests
        run: ./gradlew test

      # Log in to DockerHub
      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build Docker image
      - name: Build Docker image
        run: docker build -t soomteum/soomteum:latest .

      # Push Docker image
      - name: Push Docker image
        run: docker push soomteum/soomteum:latest

      # Set up SSH agent
      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      # Deploy to EC2 (pull & run 최신 이미지)
      - name: Deploy to EC2
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ secrets.EC2_HOST }} 'bash ~/deploy.sh'